# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW
name: Build BionicSX2 IPA

on:
  push:
    branches: [main, ios-port]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode CLI tools
        run: xcode-select --install || true

      - name: Cache iOS dep sources
        uses: actions/cache@v4
        with:
          path: ios-deps/src
          key: ios-deps-src-v1

      - name: Cache iOS dep builds
        uses: actions/cache@v4
        with:
          path: ios-deps/install
          key: ios-deps-install-${{ hashFiles('scripts/build_ios_deps.sh') }}

      - name: Debug script content
        run: |
          cat -n scripts/build_ios_deps.sh
          echo "---"
          cat -n .github/workflows/build-ipa.yml

      - name: Build third-party deps for iOS
        run: |
          chmod +x scripts/build_ios_deps.sh
          bash scripts/build_ios_deps.sh

      - name: Configure BionicSX2
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=OFF \
            -DENABLE_OPENGL=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_SDL=OFF \
            -DBUILD_TESTS=OFF

      - name: Build Core Library
        run: |
          cd build-ios
          make BionicSX2 2>&1
          echo "Core exit code: $?"

      - name: Build App Target
        run: |
          cd build-ios
          make BionicSX2_App 2>&1
          echo "App exit code: $?"

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build-ios/BionicSX2_App.app Payload/
          zip -r BionicSX2.ipa Payload/
          echo "IPA size: $(du -sh BionicSX2.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: BionicSX2.ipa
          retention-days: 7
