# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW
name: Build BionicSX2 IPA

on:
  push:
    branches: [main, ios-port]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize pcsx2 submodule
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1
          echo "Submodule status:"
          git submodule status
          echo "AudioStream.cpp location:"
          find . -name "AudioStream.cpp" -not -path "*/build*"

      - name: Patch AudioStream::CreateStream for iOS
        run: |
          set -euxo pipefail

          AUDIOSTREAM=$(find . -name "AudioStream.cpp" \
            -not -path "*/build*" \
            -not -path "*/test*" | head -1)

          if [ -z "$AUDIOSTREAM" ]; then
            echo "ERROR: AudioStream.cpp not found — submodule not initialized"
            exit 1
          fi

          echo "Patching: $AUDIOSTREAM"

          if grep -q "PCSX2_TARGET_IOS" "$AUDIOSTREAM"; then
            echo "Guard already present — skipping patch"
            exit 0
          fi

          LINE=$(grep -n "AudioStream::CreateStream" "$AUDIOSTREAM" | \
                 grep -v "declaration\|forward\|//" | head -1 | cut -d: -f1)

          if [ -z "$LINE" ]; then
            echo "ERROR: CreateStream definition not found in $AUDIOSTREAM"
            grep -n "CreateStream" "$AUDIOSTREAM"
            exit 1
          fi

          echo "CreateStream found at line $LINE"

          sed -i '' "${LINE}i\\
          #ifndef PCSX2_TARGET_IOS
          " "$AUDIOSTREAM"

          python3 - "$AUDIOSTREAM" "$LINE" <<'PYEOF'
          import sys
          filepath = sys.argv[1]
          start_line = int(sys.argv[2]) - 1
          with open(filepath, 'r') as f:
              lines = f.readlines()
          depth = 0
          end_line = None
          for i in range(start_line, len(lines)):
              depth += lines[i].count('{') - lines[i].count('}')
              if i > start_line and depth == 0:
                  end_line = i
                  break
          if end_line is None:
              print("ERROR: could not find closing brace", file=sys.stderr)
              sys.exit(1)
          lines.insert(end_line + 1, '#endif  // PCSX2_TARGET_IOS\n')
          with open(filepath, 'w') as f:
              f.writelines(lines)
          print(f"#endif inserted after line {end_line + 1}")
          PYEOF

          echo "Patch applied successfully"
          grep -n "PCSX2_TARGET_IOS\|CreateStream" "$AUDIOSTREAM" | head -10

      - name: Install Xcode CLI tools
        run: xcode-select --install || true

      - name: Cache iOS Dependencies
        uses: actions/cache@v4
        with:
          path: ios-deps
          key: ios-deps-v3-${{ hashFiles('scripts/build_ios_deps.sh') }}

      - name: Build iOS Dependencies
        run: bash scripts/build_ios_deps.sh

      - name: Find source files
        run: |
          find . -name "Log.cpp" -not -path "./.git/*"
          find . -name "FastJmp.cpp" -not -path "./.git/*"
          find . -name "Threading.cpp" -not -path "./.git/*"
          find . -name "Timer.cpp" -not -path "./.git/*"
          find . -name "imgui_freetype*" -not -path "./.git/*"
          find . -path "*/imgui*" -name "*.cpp" -not -path "./.git/*"
          echo "=== common dir contents ==="
          find . -type d -name "common" | head -5

      - name: Check built libs
        run: |
          find ios-deps/install/lib -name "*.a" | sort
          echo "---"
          find ios-deps/build -maxdepth 1 -type d | sort

      - name: Verify ios-deps headers
        run: |
          echo "=== All headers in ios-deps/install ==="
          find ios-deps/install/include -name "*.h" | sort
          echo "=== All libs in ios-deps/install ==="
          find ios-deps/install/lib -name "*.a" | sort
          echo "=== png.h location ==="
          find . -name "png.h" -not -path "./.git/*"

      - name: Prepare install directories
        run: |
          mkdir -p ios-deps/install/include
          mkdir -p ios-deps/install/lib
          mkdir -p ios-deps/install/include/webp
          printf '%s\n' \
            '#pragma once' \
            '#include <stddef.h>' \
            '#include <stdint.h>' \
            'typedef struct WebPDecoderConfig WebPDecoderConfig;' \
            'static inline int WebPGetInfo(const uint8_t* d, size_t s,' \
            '  int* w, int* h) { return 0; }' \
            'static inline uint8_t* WebPDecodeRGBA(const uint8_t* d,' \
            '  size_t s, int* w, int* h) { return nullptr; }' \
            'static inline void WebPFree(void* p) {}' \
            > ios-deps/install/include/webp/decode.h
          printf '%s\n' \
            '#pragma once' \
            '#include <stddef.h>' \
            '#include <stdint.h>' \
            'static inline size_t WebPEncodeRGBA(const uint8_t* r,' \
            '  int w, int h, int s, float q, uint8_t** o) { return 0; }' \
            > ios-deps/install/include/webp/encode.h
          printf '%s\n' \
            '#pragma once' \
            'typedef struct plutovg_surface_t plutovg_surface_t;' \
            'typedef struct plutovg_canvas_t plutovg_canvas_t;' \
            'plutovg_surface_t* plutovg_surface_create_for_data(unsigned char*,int,int,int);' \
            'void plutovg_surface_destroy(plutovg_surface_t*);' \
            'plutovg_canvas_t* plutovg_canvas_create(plutovg_surface_t*);' \
            'void plutovg_canvas_destroy(plutovg_canvas_t*);' \
            'void plutovg_canvas_scale(plutovg_canvas_t*,double,double);' \
            'void plutovg_canvas_translate(plutovg_canvas_t*,double,double);' \
            'void plutovg_convert_argb_to_rgba(unsigned char*,const unsigned char*,int,int,int);' \
            > ios-deps/install/include/plutovg.h
          printf '%s\n' \
            '#pragma once' \
            '#include "plutovg.h"' \
            'typedef struct plutosvg_document_t plutosvg_document_t;' \
            'plutosvg_document_t* plutosvg_document_load_from_data(const char*,size_t,float,float,float,plutovg_surface_t*);' \
            'float plutosvg_document_get_width(plutosvg_document_t*);' \
            'float plutosvg_document_get_height(plutosvg_document_t*);' \
            'int plutosvg_document_render(plutosvg_document_t*,void*,plutovg_canvas_t*,void*,void*,void*);' \
            'void plutosvg_document_destroy(plutosvg_document_t*);' \
            > ios-deps/install/include/plutosvg.h
          touch ios-deps/install/include/.keep
          touch ios-deps/install/lib/.keep

      - name: Configure BionicSX2
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=OFF \
            -DENABLE_OPENGL=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_SDL=OFF \
            -DBUILD_TESTS=OFF

      - name: Build Core Library
        run: |
          cd build-ios
          make BionicSX2 2>&1
          echo "Core exit code: $?"

      - name: Clean previous app build artifacts
        run: |
          rm -rf build-ios/CMakeFiles/BionicSX2_App.dir
          rm -rf build-ios/BionicSX2_App.app

      - name: Confirm clean
        run: |
          ls build-ios/CMakeFiles/BionicSX2_App.dir 2>&1 || echo "CLEAN OK - dir gone"

      - name: Inspect SymbolStubs mangled names
        continue-on-error: true
        run: |
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          xcrun --sdk iphoneos clang++ \
            -target arm64-apple-ios15.0 \
            -isysroot "$IOS_SDK" \
            -std=c++17 \
            -c ios/platform/SymbolStubs.cpp \
            -o /tmp/SymbolStubs_check.o

          echo "=== ALL EXPORTED T symbols ==="
          xcrun nm /tmp/SymbolStubs_check.o | grep " T "

      - name: Build App Target
        run: |
          cd build-ios
          make BionicSX2_App 2>&1
          echo "App exit code: $?"

      - name: Dump SymbolStubs exports vs required
        if: always()
        run: |
          echo "=== EXPORTED by SymbolStubs.cpp.o ==="
          nm build-ios/CMakeFiles/BionicSX2_App.dir/ios/platform/SymbolStubs.cpp.o \
            | grep " T " \
            | grep -E "GSDrawScanline|applyGameFixes|GameDatabase|Pcsx2Config"

          echo "=== REQUIRED by libBionicSX2.a ==="
          nm build-ios/libBionicSX2.a 2>/dev/null \
            | grep " U " \
            | grep -E "GSDrawScanline|applyGameFixes|GameDatabase" \
            | sort -u

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build-ios/BionicSX2_App.app Payload/
          zip -r BionicSX2.ipa Payload/
          echo "IPA size: $(du -sh BionicSX2.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: BionicSX2.ipa
          retention-days: 7
