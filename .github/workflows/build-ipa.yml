# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW
name: Build BionicSX2 IPA

on:
  push:
    branches: [main, ios-port]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode CLI tools
        run: xcode-select --install || true

      - name: Cache ios-deps
        uses: actions/cache@v4
        with:
          path: ios-deps/install
          key: ios-deps-${{ hashFiles('scripts/build_ios_deps.sh') }}

      - name: Build third-party deps for iOS
        run: |
          chmod +x scripts/build_ios_deps.sh
          bash scripts/build_ios_deps.sh

      - name: Configure BionicSX2
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=OFF \
            -DENABLE_OPENGL=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_SDL=OFF \
            -DBUILD_TESTS=OFF

      - name: Build BionicSX2
        run: |
          set -euxo pipefail
          # -k tells make to keep going past errors, surfacing ALL failures in one run
          cmake --build build-ios --config Release -j"$(sysctl -n hw.logicalcpu)" -- -k

      - name: Verify Build Output
        run: |
          set -euxo pipefail
          APP="build-ios/BionicSX2.app/BionicSX2"
          if [ -f "$APP" ]; then
            echo "Binary found at $APP"
            SIZE=$(stat -f%z "$APP" 2>/dev/null || echo 0)
            echo "Binary size: $SIZE bytes"
            if [ "$SIZE" -lt 5000000 ]; then
              echo "WARNING: Binary size seems small ($SIZE bytes)"
            fi
            nm "$APP" 2>/dev/null | grep -E 'cpuReset|SysMemory|GSopen' && echo "Core symbols verified" || echo "WARNING: Core symbols not found in binary"
          else
            echo "Looking for binary..."
            find build-ios -name "*.a" -o -name "*.app" -type d 2>/dev/null
          fi

      - name: Find .app location
        run: |
          echo "=== Searching for .app bundles ==="
          find . -name "*.app" -type d 2>/dev/null
          echo "=== Searching for BionicSX2 binary ==="
          find . -name "BionicSX2" -type f 2>/dev/null
          echo "=== build-ios/ contents ==="
          ls -la build-ios/ 2>/dev/null || echo "build-ios/ empty or missing"

      - name: Create IPA
        run: |
          APP=$(find . -name "*.app" -type d | head -1)
          echo "Found .app at: $APP"
          mkdir -p ipa-staging/Payload
          cp -r "$APP" ipa-staging/Payload/
          cd ipa-staging
          zip -r ../BionicSX2.ipa Payload/
          cd ..
          echo "IPA size: $(du -sh BionicSX2.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: BionicSX2.ipa
          retention-days: 7
