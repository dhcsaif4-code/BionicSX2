# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW
name: Build BionicSX2 IPA

on:
  push:
    branches: [main, ios-port]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode CLI tools
        run: xcode-select --install || true

      - name: Cache iOS dep sources
        uses: actions/cache@v4
        with:
          path: ios-deps/src
          key: ios-deps-src-v1

      - name: Cache iOS dep builds
        uses: actions/cache@v4
        with:
          path: ios-deps/install
          key: ios-deps-install-${{ hashFiles('scripts/build_ios_deps.sh') }}

      - name: Clone iOS Dependencies
        run: |
          mkdir -p ios-deps/src
          cd ios-deps/src

          [ -d zlib ]     || git clone --depth 1 \
            https://github.com/madler/zlib.git

          [ -d zstd ]     || git clone --depth 1 \
            https://github.com/facebook/zstd.git

          [ -d lz4 ]      || git clone --depth 1 \
            https://github.com/lz4/lz4.git

          [ -d xz ]       || git clone --depth 1 \
            https://github.com/tukaani-project/xz.git

          [ -d freetype ] || git clone --depth 1 \
            https://gitlab.freedesktop.org/freetype/freetype.git

          [ -d libzip ]   || git clone --depth 1 \
            https://github.com/nih-at/libzip.git

      - name: Patch libzip for iOS (comprehensive _s compat header)
        run: |
          DIR="ios-deps/src/libzip/lib"
          if [ -d "$DIR" ]; then
            H="$DIR/zip_compat_ios.h"
            echo '#pragma once' > "$H"
            echo '#include <string.h>' >> "$H"
            echo '#include <stddef.h>' >> "$H"
            echo '#ifndef errno_t' >> "$H"
            echo 'typedef int errno_t;' >> "$H"
            echo '#endif' >> "$H"
            echo 'static inline int _zc_memcpy_s(void *d, size_t ds, const void *s, size_t n) { (void)ds; memcpy(d, s, n); return 0; }' >> "$H"
            echo 'static inline int _zc_memmove_s(void *d, size_t ds, const void *s, size_t n) { (void)ds; memmove(d, s, n); return 0; }' >> "$H"
            echo 'static inline int _zc_strncpy_s(char *d, size_t ds, const char *s, size_t n) { (void)ds; strncpy(d, s, n); return 0; }' >> "$H"
            echo 'static inline int _zc_strcpy_s(char *d, size_t ds, const char *s) { (void)ds; strcpy(d, s); return 0; }' >> "$H"
            echo 'static inline int _zc_strcat_s(char *d, size_t ds, const char *s) { (void)ds; strcat(d, s); return 0; }' >> "$H"
            echo 'static inline size_t _zc_strnlen_s(const char *s, size_t max) { return s ? strnlen(s, max) : 0; }' >> "$H"
            echo '#define memcpy_s(d,ds,s,n)   _zc_memcpy_s(d,ds,s,n)' >> "$H"
            echo '#define memmove_s(d,ds,s,n)  _zc_memmove_s(d,ds,s,n)' >> "$H"
            echo '#define strncpy_s(d,ds,s,n)  _zc_strncpy_s(d,ds,s,n)' >> "$H"
            echo '#define strcpy_s(d,ds,s)     _zc_strcpy_s(d,ds,s)' >> "$H"
            echo '#define strcat_s(d,ds,s)     _zc_strcat_s(d,ds,s)' >> "$H"
            echo '#define strnlen_s(s,m)        _zc_strnlen_s(s,m)' >> "$H"
            echo 'static inline size_t _zc_strerrorlen_s(int e) { (void)e; return 94; }' >> "$H"
            printf 'static inline int _zc_strerror_s(char *b, size_t bl, int e) {\n' >> "$H"
            printf '  const char *m = strerror(e);\n' >> "$H"
            printf '  strncpy(b, m ? m : "Unknown error", bl - 1);\n' >> "$H"
            printf '  b[bl - 1] = '\''\\0'\'';\n' >> "$H"
            printf '  return 0;\n}\n' >> "$H"
            echo '#define strerrorlen_s(e)       _zc_strerrorlen_s(e)' >> "$H"
            echo '#define strerror_s(b,bl,e)     _zc_strerror_s(b,bl,e)' >> "$H"

            for f in "$DIR"/*.c; do
              grep -q "zip_compat_ios.h" "$f" || \
                sed -i.bak '1s/^/#include "zip_compat_ios.h"\n/' "$f"
            done
            echo "Patched all .c files in $DIR with zip_compat_ios.h"
          fi

      - name: Build third-party deps for iOS
        run: |
          chmod +x scripts/build_ios_deps.sh
          bash scripts/build_ios_deps.sh

      - name: Configure BionicSX2
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=OFF \
            -DENABLE_OPENGL=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_SDL=OFF \
            -DBUILD_TESTS=OFF

      - name: Build Core Library
        run: |
          cd build-ios
          make BionicSX2 2>&1
          echo "Core exit code: $?"

      - name: Build App Target
        run: |
          cd build-ios
          make BionicSX2_App 2>&1
          echo "App exit code: $?"

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build-ios/BionicSX2_App.app Payload/
          zip -r BionicSX2.ipa Payload/
          echo "IPA size: $(du -sh BionicSX2.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: BionicSX2.ipa
          retention-days: 7
