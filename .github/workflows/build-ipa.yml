# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW
name: Build BionicSX2 IPA

on:
  push:
    branches: [main, ios-port]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode CLI tools
        run: xcode-select --install || true

      - name: Cache ios-deps
        uses: actions/cache@v4
        with:
          path: ios-deps/install
          key: ios-deps-${{ hashFiles('scripts/build_ios_deps.sh') }}

      - name: Build third-party deps for iOS
        run: |
          chmod +x scripts/build_ios_deps.sh
          bash scripts/build_ios_deps.sh

      - name: Configure BionicSX2
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=OFF \
            -DENABLE_OPENGL=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_SDL=OFF \
            -DBUILD_TESTS=OFF

      - name: Build BionicSX2
        run: |
          set -euxo pipefail
          # -k tells make to keep going past errors, surfacing ALL failures in one run
          cmake --build build-ios --config Release -j"$(sysctl -n hw.logicalcpu)" -- -k

      - name: Discover build output
        run: |
          echo "=== All files in build-ios/ ==="
          find build-ios/ -type f | head -30
          echo "=== Large files (>1MB) anywhere ==="
          find . -type f -size +1M \
            ! -path "./.git/*" \
            ! -path "./pcsx2/*" \
            ! -path "./3rdparty/*" \
            | sort -k1 | head -20

          # Package as IPA
          mkdir -p Payload
          cp -r BionicSX2.app Payload/
          zip -r BionicSX2.ipa Payload/
          echo "IPA size: $(du -sh BionicSX2.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: BionicSX2.ipa
          retention-days: 7
