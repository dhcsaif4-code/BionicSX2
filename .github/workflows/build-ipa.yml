# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW
name: Build BionicSX2 IPA

on:
  push:
    branches: [main, ios-port]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode CLI tools
        run: xcode-select --install || true

      - name: Cache ios-deps
        uses: actions/cache@v4
        with:
          path: ios-deps/install
          key: ios-deps-${{ hashFiles('scripts/build_ios_deps.sh') }}

      - name: Build third-party deps for iOS
        run: |
          chmod +x scripts/build_ios_deps.sh
          bash scripts/build_ios_deps.sh

      - name: Configure BionicSX2
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=OFF \
            -DENABLE_OPENGL=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_SDL=OFF \
            -DBUILD_TESTS=OFF

      - name: Build BionicSX2
        run: |
          set -euxo pipefail
          # -k tells make to keep going past errors, surfacing ALL failures in one run
          cmake --build build-ios --config Release -j"$(sysctl -n hw.logicalcpu)" -- -k

      - name: Relink app with core library
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          LIB=$(find build-ios -name "libBionicSX2.a" | head -1)

          # Collect all .o files from the app target
          OBJ_DIR="build-ios/CMakeFiles/BionicSX2_App.dir"
          OBJS=$(find "$OBJ_DIR" -name "*.o" | tr '\n' ' ')
          echo "Object files: $OBJS"
          echo "Library: $LIB ($(du -sh $LIB))"

          # Link everything together into final binary
          clang++ \
            -target arm64-apple-ios16.0 \
            -isysroot "$SDK" \
            $OBJS "$LIB" \
            -framework Metal \
            -framework UIKit \
            -framework AVFoundation \
            -framework GameController \
            -framework AudioToolbox \
            -framework CoreMotion \
            -framework Foundation \
            -framework CoreGraphics \
            -framework QuartzCore \
            -o build-ios/BionicSX2_App.app/BionicSX2_App

          echo "Final size: $(du -sh build-ios/BionicSX2_App.app/BionicSX2_App)"

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build-ios/BionicSX2_App.app Payload/
          zip -r BionicSX2.ipa Payload/
          echo "IPA size: $(du -sh BionicSX2.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: BionicSX2.ipa
          retention-days: 7
