# AUDIT REFERENCE: Sections 10.3, 13.6
# STATUS: NEW
name: Build BionicSX2 IPA

on:
  push:
    branches: [main, ios-port]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 8

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize pcsx2 submodule
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1
          echo "Submodule status:"
          git submodule status
          echo "AudioStream.cpp location:"
          find . -name "AudioStream.cpp" -not -path "*/build*"

      - name: Patch AudioStream::CreateStream for iOS
        run: |
          set -euxo pipefail
          FILE="pcsx2/pcsx2/Host/AudioStream.cpp"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found"
            exit 1
          fi

          if grep -q "PCSX2_TARGET_IOS" "$FILE"; then
            echo "Guard already present — skipping"
            exit 0
          fi

          python3 <<PYEOF
          with open("$FILE", "r") as f:
              content = f.read()

          MARKER = "std::unique_ptr<AudioStream> AudioStream::CreateStream("
          if MARKER not in content:
              print("ERROR: CreateStream not found")
              exit(1)

          idx = content.find(MARKER)
          line_start = content.rfind("\n", 0, idx) + 1

          brace_start = content.find("{", idx)
          depth = 0
          i = brace_start
          while i < len(content):
              if content[i] == "{":
                  depth += 1
              elif content[i] == "}":
                  depth -= 1
                  if depth == 0:
                      break
              i += 1

          line_end = content.find("\n", i) + 1

          before = content[:line_start]
          func   = content[line_start:line_end]
          after  = content[line_end:]

          patched = (before
              + "#ifndef PCSX2_TARGET_IOS\n"
              + func
              + "#endif  // PCSX2_TARGET_IOS\n"
              + after)

          with open("$FILE", "w") as f:
              f.write(patched)

          print("Patch applied successfully")
          PYEOF

          echo "Result:"
          grep -n "PCSX2_TARGET_IOS\|CreateStream" "$FILE" | head -6

      - name: Patch Vif_Dynarec.h for iOS (force interpreter path)
        run: |
          set -euxo pipefail
          FILE="pcsx2/pcsx2/Vif_Dynarec.h"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found"
            exit 1
          fi

          # Replace: static constexpr bool newVifDynaRec = 1;
          # With:    iOS guard forcing 0 (interpreter path)
          python3 <<'PYEOF'
          with open("pcsx2/pcsx2/Vif_Dynarec.h", "r") as f:
              content = f.read()

          OLD = "static constexpr bool newVifDynaRec = 1;"
          NEW = (
              "#if defined(PCSX2_TARGET_IOS)\n"
              "static constexpr bool newVifDynaRec = 0;  // iOS: no JIT, interpreter path\n"
              "#else\n"
              "static constexpr bool newVifDynaRec = 1;\n"
              "#endif"
          )

          if OLD not in content:
              print("WARNING: line not found — already patched or unexpected format")
              print("Contents around 'newVifDynaRec':")
              for i, line in enumerate(content.splitlines()):
                  if "newVifDynaRec" in line:
                      print(f"  {i+1}: {line}")
              exit(0)

          content = content.replace(OLD, NEW, 1)

          with open("pcsx2/pcsx2/Vif_Dynarec.h", "w") as f:
              f.write(content)

          print("Vif_Dynarec.h patched successfully")
          PYEOF

          echo "Result:"
          grep -n "newVifDynaRec" "$FILE"

      - name: Patch cpuReset / psxReset with per-line fprintf debug tracing
        run: |
          set -euxo pipefail
          python3 <<'PYEOF'
          import re

          # ── R5900.cpp: cpuReset() — 17 per-line traces ─────────────────
          with open("pcsx2/pcsx2/R5900.cpp", "r") as f:
              r59 = f.read()

          r59_old = """void cpuReset()
{
	std::memset(&cpuRegs, 0, sizeof(cpuRegs));
	std::memset(&fpuRegs, 0, sizeof(fpuRegs));
	std::memset(&tlb, 0, sizeof(tlb));
	cachedTlbs.count = 0;

	cpuRegs.pc				= 0xbfc00000; //set pc reg to stack
	cpuRegs.CP0.n.Config	= 0x440;
	cpuRegs.CP0.n.Status.val= 0x70400004; //0x10900000 <-- wrong; // COP0 enabled | BEV = 1 | TS = 1
	cpuRegs.CP0.n.PRid		= 0x00002e20; // PRevID = Revision ID, same as R5900
	fpuRegs.fprc[0]			= 0x00002e30; // fpu Revision..
	fpuRegs.fprc[31]		= 0x01000001; // fpu Status/Control

	cpuRegs.nextEventCycle = cpuRegs.cycle + 4;
	EEsCycle = 0;
	EEoCycle = cpuRegs.cycle;

	psxReset();
	pgifInit();

	extern void Deci2Reset();		// lazy, no good header for it yet.
	Deci2Reset();

	AllowParams1 = !VMManager::Internal::IsFastBootInProgress();
	AllowParams2 = !VMManager::Internal::IsFastBootInProgress();
	ParamsRead = false;

	g_eeloadMain = 0;
	g_eeloadExec = 0;
	g_osdsys_str = 0;

	CBreakPoints::ClearSkipFirst();
}"""

          r59_new = """void cpuReset()
{
	fprintf(stderr, "[cpuReset] line 0: starting\\n"); fflush(stderr);
	std::memset(&cpuRegs, 0, sizeof(cpuRegs));
	fprintf(stderr, "[cpuReset] line 1: memset cpuRegs done\\n"); fflush(stderr);
	std::memset(&fpuRegs, 0, sizeof(fpuRegs));
	fprintf(stderr, "[cpuReset] line 2: memset fpuRegs done\\n"); fflush(stderr);
	std::memset(&tlb, 0, sizeof(tlb));
	fprintf(stderr, "[cpuReset] line 3: memset tlb done\\n"); fflush(stderr);
	cachedTlbs.count = 0;
	fprintf(stderr, "[cpuReset] line 4: cachedTlbs cleared\\n"); fflush(stderr);

	cpuRegs.pc				= 0xbfc00000; //set pc reg to stack
	fprintf(stderr, "[cpuReset] line 5: pc set\\n"); fflush(stderr);
	cpuRegs.CP0.n.Config	= 0x440;
	fprintf(stderr, "[cpuReset] line 6: Config set\\n"); fflush(stderr);
	cpuRegs.CP0.n.Status.val= 0x70400004; //0x10900000 <-- wrong; // COP0 enabled | BEV = 1 | TS = 1
	fprintf(stderr, "[cpuReset] line 7: Status set\\n"); fflush(stderr);
	cpuRegs.CP0.n.PRid		= 0x00002e20; // PRevID = Revision ID, same as R5900
	fprintf(stderr, "[cpuReset] line 8: PRid set\\n"); fflush(stderr);
	fpuRegs.fprc[0]			= 0x00002e30; // fpu Revision..
	fpuRegs.fprc[31]		= 0x01000001; // fpu Status/Control
	fprintf(stderr, "[cpuReset] line 9: fprcs set\\n"); fflush(stderr);

	cpuRegs.nextEventCycle = cpuRegs.cycle + 4;
	fprintf(stderr, "[cpuReset] line 10: nextEventCycle set\\n"); fflush(stderr);
	EEsCycle = 0;
	EEoCycle = cpuRegs.cycle;
	fprintf(stderr, "[cpuReset] line 11: EEs/EEo set\\n"); fflush(stderr);

	psxReset();
	fprintf(stderr, "[cpuReset] line 12: psxReset() done\\n"); fflush(stderr);
	pgifInit();
	fprintf(stderr, "[cpuReset] line 13: pgifInit() done\\n"); fflush(stderr);

	extern void Deci2Reset();		// lazy, no good header for it yet.
	Deci2Reset();
	fprintf(stderr, "[cpuReset] line 14: Deci2Reset() done\\n"); fflush(stderr);

	AllowParams1 = !VMManager::Internal::IsFastBootInProgress();
	AllowParams2 = !VMManager::Internal::IsFastBootInProgress();
	fprintf(stderr, "[cpuReset] line 15: AllowParams set\\n"); fflush(stderr);
	ParamsRead = false;

	g_eeloadMain = 0;
	g_eeloadExec = 0;
	g_osdsys_str = 0;
	fprintf(stderr, "[cpuReset] line 16: g_* globals zeroed\\n"); fflush(stderr);

	CBreakPoints::ClearSkipFirst();
	fprintf(stderr, "[cpuReset] line 17: complete\\n"); fflush(stderr);
}"""

          if r59_old not in r59:
              print("WARNING: cpuReset() body not found as expected in R5900.cpp")
              # Show what we found
              idx = r59.find("void cpuReset()")
              if idx >= 0:
                  print("Found cpuReset at offset", idx)
                  print(r59[idx:idx+600])
              exit(0)

          r59 = r59.replace(r59_old, r59_new, 1)

          with open("pcsx2/pcsx2/R5900.cpp", "w") as f:
              f.write(r59)

          print("R5900.cpp patched with per-line cpuReset tracing")

          # ── R3000A.cpp: psxReset() — 6 per-line traces ─────────────────
          with open("pcsx2/pcsx2/R3000A.cpp", "r") as f:
              r3k = f.read()

          r3k_old = """void psxReset()
{
	std::memset(&psxRegs, 0, sizeof(psxRegs));

	psxRegs.pc = 0xbfc00000; // Start in bootstrap
	psxRegs.CP0.n.Status = 0x00400000; // BEV = 1
	psxRegs.CP0.n.PRid   = 0x0000001f; // PRevID = Revision ID, same as the IOP R3000A

	psxRegs.iopBreak = 0;
	psxRegs.iopCycleEE = -1;
	psxRegs.iopCycleEECarry = 0;
	psxRegs.iopNextEventCycle = psxRegs.cycle + 4;

	psxHwReset();
	PSXCLK = 36864000;
	ioman::reset();
	psxBiosReset();
}"""

          r3k_new = """void psxReset()
{
	fprintf(stderr, "[psxReset] line 0: starting\\n"); fflush(stderr);
	std::memset(&psxRegs, 0, sizeof(psxRegs));
	fprintf(stderr, "[psxReset] line 1: memset psxRegs done\\n"); fflush(stderr);

	psxRegs.pc = 0xbfc00000; // Start in bootstrap
	psxRegs.CP0.n.Status = 0x00400000; // BEV = 1
	psxRegs.CP0.n.PRid   = 0x0000001f; // PRevID = Revision ID, same as the IOP R3000A
	fprintf(stderr, "[psxReset] line 2: regs set\\n"); fflush(stderr);

	psxRegs.iopBreak = 0;
	psxRegs.iopCycleEE = -1;
	psxRegs.iopCycleEECarry = 0;
	psxRegs.iopNextEventCycle = psxRegs.cycle + 4;
	fprintf(stderr, "[psxReset] line 3: cycle regs set\\n"); fflush(stderr);

	psxHwReset();
	fprintf(stderr, "[psxReset] line 4: psxHwReset() done\\n"); fflush(stderr);
	PSXCLK = 36864000;
	ioman::reset();
	fprintf(stderr, "[psxReset] line 5: ioman::reset() done\\n"); fflush(stderr);
	psxBiosReset();
	fprintf(stderr, "[psxReset] line 6: psxBiosReset() done\\n"); fflush(stderr);
}"""

          if r3k_old not in r3k:
              print("WARNING: psxReset() body not found as expected in R3000A.cpp")
              idx = r3k.find("void psxReset()")
              if idx >= 0:
                  print("Found psxReset at offset", idx)
                  print(r3k[idx:idx+400])
              exit(0)

          r3k = r3k.replace(r3k_old, r3k_new, 1)

          with open("pcsx2/pcsx2/R3000A.cpp", "w") as f:
              f.write(r3k)

          print("R3000A.cpp patched with per-line psxReset tracing")
          print("=== All patches applied successfully ===")
          PYEOF

          echo "Verification:"
          grep -c "fprintf(stderr" pcsx2/pcsx2/R5900.cpp pcsx2/pcsx2/R3000A.cpp

      - name: Install Xcode CLI tools
        run: xcode-select --install || true

      - name: Cache iOS Dependencies
        uses: actions/cache@v4
        with:
          path: ios-deps
          key: ios-deps-v3-${{ hashFiles('scripts/build_ios_deps.sh') }}

      - name: Build iOS Dependencies
        run: bash scripts/build_ios_deps.sh

      - name: Find source files
        run: |
          find . -name "Log.cpp" -not -path "./.git/*"
          find . -name "FastJmp.cpp" -not -path "./.git/*"
          find . -name "Threading.cpp" -not -path "./.git/*"
          find . -name "Timer.cpp" -not -path "./.git/*"
          find . -name "imgui_freetype*" -not -path "./.git/*"
          find . -path "*/imgui*" -name "*.cpp" -not -path "./.git/*"
          echo "=== common dir contents ==="
          find . -type d -name "common" | head -5

      - name: Check built libs
        run: |
          find ios-deps/install/lib -name "*.a" | sort
          echo "---"
          find ios-deps/build -maxdepth 1 -type d | sort

      - name: Verify ios-deps headers
        run: |
          echo "=== All headers in ios-deps/install ==="
          find ios-deps/install/include -name "*.h" | sort
          echo "=== All libs in ios-deps/install ==="
          find ios-deps/install/lib -name "*.a" | sort
          echo "=== png.h location ==="
          find . -name "png.h" -not -path "./.git/*"

      - name: Prepare install directories
        run: |
          mkdir -p ios-deps/install/include
          mkdir -p ios-deps/install/lib
          mkdir -p ios-deps/install/include/webp
          printf '%s\n' \
            '#pragma once' \
            '#include <stddef.h>' \
            '#include <stdint.h>' \
            'typedef struct WebPDecoderConfig WebPDecoderConfig;' \
            'static inline int WebPGetInfo(const uint8_t* d, size_t s,' \
            '  int* w, int* h) { return 0; }' \
            'static inline uint8_t* WebPDecodeRGBA(const uint8_t* d,' \
            '  size_t s, int* w, int* h) { return nullptr; }' \
            'static inline void WebPFree(void* p) {}' \
            > ios-deps/install/include/webp/decode.h
          printf '%s\n' \
            '#pragma once' \
            '#include <stddef.h>' \
            '#include <stdint.h>' \
            'static inline size_t WebPEncodeRGBA(const uint8_t* r,' \
            '  int w, int h, int s, float q, uint8_t** o) { return 0; }' \
            > ios-deps/install/include/webp/encode.h
          printf '%s\n' \
            '#pragma once' \
            'typedef struct plutovg_surface_t plutovg_surface_t;' \
            'typedef struct plutovg_canvas_t plutovg_canvas_t;' \
            'plutovg_surface_t* plutovg_surface_create_for_data(unsigned char*,int,int,int);' \
            'void plutovg_surface_destroy(plutovg_surface_t*);' \
            'plutovg_canvas_t* plutovg_canvas_create(plutovg_surface_t*);' \
            'void plutovg_canvas_destroy(plutovg_canvas_t*);' \
            'void plutovg_canvas_scale(plutovg_canvas_t*,double,double);' \
            'void plutovg_canvas_translate(plutovg_canvas_t*,double,double);' \
            'void plutovg_convert_argb_to_rgba(unsigned char*,const unsigned char*,int,int,int);' \
            > ios-deps/install/include/plutovg.h
          printf '%s\n' \
            '#pragma once' \
            '#include "plutovg.h"' \
            'typedef struct plutosvg_document_t plutosvg_document_t;' \
            'plutosvg_document_t* plutosvg_document_load_from_data(const char*,size_t,float,float,float,plutovg_surface_t*);' \
            'float plutosvg_document_get_width(plutosvg_document_t*);' \
            'float plutosvg_document_get_height(plutosvg_document_t*);' \
            'int plutosvg_document_render(plutosvg_document_t*,void*,plutovg_canvas_t*,void*,void*,void*);' \
            'void plutosvg_document_destroy(plutosvg_document_t*);' \
            > ios-deps/install/include/plutosvg.h
          touch ios-deps/install/include/.keep
          touch ios-deps/install/lib/.keep

      - name: Configure BionicSX2
        run: |
          cmake -S . -B build-ios \
            -DCMAKE_TOOLCHAIN_FILE=cmake/ios.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=OFF \
            -DENABLE_OPENGL=OFF \
            -DENABLE_VULKAN=OFF \
            -DUSE_SDL=OFF \
            -DBUILD_TESTS=OFF \
            -DCODE_SIGN_IDENTITY="" \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO

      - name: Build Core Library
        run: |
          cd build-ios
          make BionicSX2 2>&1
          echo "Core exit code: $?"

      - name: Clean previous app build artifacts
        run: |
          rm -rf build-ios/CMakeFiles/BionicSX2_App.dir
          rm -rf build-ios/BionicSX2_App.app

      - name: Confirm clean
        run: |
          ls build-ios/CMakeFiles/BionicSX2_App.dir 2>&1 || echo "CLEAN OK - dir gone"

      - name: Inspect SymbolStubs mangled names
        continue-on-error: true
        run: |
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          xcrun --sdk iphoneos clang++ \
            -target arm64-apple-ios15.0 \
            -isysroot "$IOS_SDK" \
            -std=c++17 \
            -c ios/platform/SymbolStubs.cpp \
            -o /tmp/SymbolStubs_check.o

          echo "=== ALL EXPORTED T symbols ==="
          xcrun nm /tmp/SymbolStubs_check.o | grep " T "

      - name: Build App Target
        run: |
          cd build-ios
          make BionicSX2_App 2>&1
          echo "App exit code: $?"

      - name: Dump SymbolStubs exports vs required
        if: always()
        run: |
          echo "=== EXPORTED by SymbolStubs.cpp.o ==="
          nm build-ios/CMakeFiles/BionicSX2_App.dir/ios/platform/SymbolStubs.cpp.o \
            | grep " T " \
            | grep -E "GSDrawScanline|applyGameFixes|GameDatabase|Pcsx2Config"

          echo "=== REQUIRED by libBionicSX2.a ==="
          nm build-ios/libBionicSX2.a 2>/dev/null \
            | grep " U " \
            | grep -E "GSDrawScanline|applyGameFixes|GameDatabase" \
            | sort -u

      - name: Package IPA manually
        run: |
          set -euxo pipefail
          APP_BINARY="build-ios/BionicSX2_App.app/BionicSX2_App"

          # Verify binary exists and is fat/arm64
          test -f "$APP_BINARY"
          file "$APP_BINARY"
          lipo -info "$APP_BINARY"

          # Create Payload with correct .app bundle name
          mkdir -p Payload
          cp -r build-ios/BionicSX2_App.app Payload/BionicSX2.app

          # Verify Info.plist is inside
          test -f Payload/BionicSX2.app/Info.plist

          # Ad-hoc sign for sideloading
          codesign --force --deep --sign - \
            --entitlements ios/entitlements/BionicSX2.entitlements \
            Payload/BionicSX2.app

          # Package as IPA
          rm -f BionicSX2.ipa
          zip -r BionicSX2.ipa Payload/
          echo "IPA size: $(du -sh BionicSX2.ipa)"
          echo "IPA contents:"
          unzip -l BionicSX2.ipa | grep -E "Payload|Info\.plist|\.app/$"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BionicSX2-IPA
          path: BionicSX2.ipa
          retention-days: 7
